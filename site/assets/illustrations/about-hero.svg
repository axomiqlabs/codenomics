<svg xmlns="http://www.w3.org/2000/svg" width="460" height="440" viewBox="0 0 460 440" fill="none"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, Arial, sans-serif"
     role="img" aria-label="What to measure: not tokens burned (what a token meter shows), but commits shipped (what actually ships value) — so the value per commit, measured right, can rise.">
  <defs>
    <linearGradient id="cn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/><stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="grn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16a34a"/><stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="trendfill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f46e5" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#4f46e5" stop-opacity="0.01"/>
    </linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <clipPath id="card"><rect x="18" y="20" width="424" height="400" rx="18"/></clipPath>
  </defs>

  <g filter="url(#sh)"><rect x="18" y="20" width="424" height="400" rx="18" fill="#ffffff" stroke="#eef0f4"/></g>
  <g clip-path="url(#card)"><circle cx="446" cy="38" r="130" fill="url(#cn)" opacity="0.06"/></g>

  <!-- header -->
  <rect x="50" y="46" width="30" height="30" rx="8" fill="url(#cn)"/>
  <g transform="translate(50 46) scale(0.469)">
    <path d="M17 42 L28 34 L36 39 L48 23" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M48 23 L41 23 M48 23 L48 30" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="90" y="66" font-size="11" font-weight="700" letter-spacing="1.4" fill="#94a3b8">WHAT TO MEASURE</text>

  <!-- item 1: tokens burned (de-emphasized, struck) -->
  <circle cx="64" cy="126" r="13" fill="#f1f3f7"/>
  <path d="M59 121 L69 131 M69 121 L59 131" stroke="#b4bccb" stroke-width="2.2" stroke-linecap="round"/>
  <text x="88" y="124" font-size="17" font-weight="600" fill="#94a3b8">Tokens burned</text>
  <line x1="88" y1="119" x2="216" y2="119" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <text x="88" y="145" font-size="12" font-weight="500" fill="#b4bccb">what a token meter shows</text>

  <!-- item 2: commits shipped (emphasized) -->
  <rect x="42" y="164" width="376" height="62" rx="13" fill="#ecfdf3"/>
  <circle cx="70" cy="197" r="14" fill="url(#grn)"/>
  <path d="M63 197 L68 202 L78 190" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="96" y="192" font-size="17" font-weight="700" fill="#15803d">Commits shipped</text>
  <text x="96" y="212" font-size="12" font-weight="500" fill="#16a34a">what actually ships value</text>

  <line x1="50" y1="260" x2="410" y2="260" stroke="#eef0f4" stroke-width="1"/>

  <!-- value trend: rises when you measure the right line -->
  <text x="50" y="288" font-size="10.5" font-weight="700" letter-spacing="1" fill="#94a3b8">VALUE PER COMMIT, MEASURED RIGHT</text>
  <path d="M50 374 L120 362 L182 346 L250 352 L318 322 L390 302 L390 392 L50 392 Z" fill="url(#trendfill)"/>
  <path d="M50 374 L120 362 L182 346 L250 352 L318 322 L390 302" fill="none" stroke="url(#cn)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M390 302 L381 304 M390 302 L390 312" fill="none" stroke="url(#cn)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="50" y="412" font-size="13" font-weight="700" fill="#4f46e5">true $ / commit</text>
</svg>
