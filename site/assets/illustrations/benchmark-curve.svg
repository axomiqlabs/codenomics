<svg xmlns="http://www.w3.org/2000/svg" width="760" height="320" viewBox="0 0 760 320" fill="none"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, Arial, sans-serif"
     role="img" aria-label="Benchmark: a distribution of true cost per commit across teams. Your position sits left of the peer median, meaning lower cost. Cohorts are shown only when at least five organizations share them.">
  <defs>
    <linearGradient id="cn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/><stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f46e5" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#4f46e5" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <text x="60" y="40" font-size="13" font-weight="700" letter-spacing="1.2" fill="#94a3b8">WHERE YOU LAND VS THE FIELD</text>

  <!-- distribution area + curve -->
  <path d="M70 248 C 220 248, 285 108, 420 100 C 555 108, 620 248, 700 248 Z" fill="url(#fill)"/>
  <path d="M70 248 C 220 248, 285 108, 420 100 C 555 108, 620 248, 700 248" fill="none" stroke="url(#cn)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- axis -->
  <line x1="60" y1="248" x2="708" y2="248" stroke="#e7e9ee" stroke-width="1.5"/>

  <!-- peer median marker -->
  <line x1="420" y1="100" x2="420" y2="248" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="420" y="270" text-anchor="middle" font-size="12" font-weight="600" fill="#64748b">peer median</text>

  <!-- your marker (left of median = lower cost) -->
  <line x1="258" y1="168" x2="258" y2="248" stroke="#16a34a" stroke-width="2"/>
  <circle cx="258" cy="168" r="6" fill="#16a34a" stroke="#ffffff" stroke-width="2.5"/>
  <g filter="url(#sh)"><rect x="198" y="120" width="120" height="40" rx="10" fill="#ffffff" stroke="#c5f0d4"/></g>
  <text x="214" y="138" font-size="12.5" font-weight="800" fill="#15803d">You · $16.60</text>
  <text x="214" y="152" font-size="10.5" font-weight="600" fill="#16a34a"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace">38th percentile</text>

  <!-- axis direction labels -->
  <text x="60" y="296" font-size="12.5" font-weight="700" fill="#16a34a">← lower true cost</text>
  <text x="708" y="296" text-anchor="end" font-size="12.5" font-weight="500" fill="#94a3b8">higher →</text>
  <text x="384" y="296" font-size="12" font-weight="500" fill="#94a3b8"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace">true $ / commit</text>

  <!-- honest k-anonymity note -->
  <g transform="translate(508 28)">
    <rect x="0" y="0" width="220" height="26" rx="13" fill="#f7f8fa" stroke="#eef0f4"/>
    <circle cx="16" cy="13" r="3.5" fill="#16a34a"/>
    <text x="28" y="17" font-size="10.5" font-weight="600" fill="#64748b">shown only at ≥ 5 orgs per cohort</text>
  </g>
</svg>
