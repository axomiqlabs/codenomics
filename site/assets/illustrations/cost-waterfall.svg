<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" fill="none" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, Arial, sans-serif" role="img" aria-label="Cost waterfall building true cost per commit. Fresh tokens $5.20, minus $1.30 cache adjustment gives compute $3.90, plus attention $10.40, plus supervision time $2.30, equals true cost per commit $16.60. Illustrative.">
