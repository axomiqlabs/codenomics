<rect x="398" y="123.4" width="64" height="150.2" rx="6" fill="#8b5cf6"/>
<text x="430" y="114.4" font-size="13" font-weight="800" fill="#8b5cf6" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">+$10.40</text>
<text x="430" y="352" font-size="11.5" font-weight="600" fill="#64748b" text-anchor="middle">Attention $</text>
