<text x="632" y="81.2" font-size="13" font-weight="800" fill="#16a34a" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">$16.60</text>
<text x="632" y="352" font-size="11.5" font-weight="600" fill="#64748b" text-anchor="middle">True $/</text>
