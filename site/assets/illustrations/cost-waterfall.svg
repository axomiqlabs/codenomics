<text x="212" y="245.9" font-size="13" font-weight="800" fill="#16a34a" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">−$1.30</text>
<text x="212" y="352" font-size="11.5" font-weight="600" fill="#64748b" text-anchor="middle">Cache adj.</text>
