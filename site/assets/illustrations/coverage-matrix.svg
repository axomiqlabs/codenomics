<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300" fill="none"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, Arial, sans-serif"
     role="img" aria-label="What each tool can see. Vendor usage analytics: tokens only. Observability or API proxy: tokens and multi-vendor, but not what shipped or the human cost. Codenomics: tokens, multi-vendor, what shipped, and human cost — all four.">
  <defs>
    <linearGradient id="cn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/><stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="grn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16a34a"/><stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <g id="ck"><circle r="11" fill="url(#grn)"/><path d="M-4.6 0 L-1.2 3.6 L5 -4.2" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></g>
    <g id="ds"><line x1="-7" y1="0" x2="7" y2="0" stroke="#cbd5e1" stroke-width="2.5" stroke-linecap="round"/></g>
  </defs>

  <text x="360" y="24" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">What each tool can actually see</text>
  <text x="360" y="45" text-anchor="middle" font-size="11.5" font-weight="500" fill="#94a3b8">tokens are easy to see — what shipped, and the human behind it, are not</text>

  <!-- column headers -->
  <g font-size="11" font-weight="700" fill="#64748b" text-anchor="middle">
    <text x="330" y="74">Tokens</text>
    <text x="444" y="74">Multi-vendor</text>
    <text x="558" y="74">What shipped</text>
    <text x="670" y="74">Human cost</text>
  </g>
  <line x1="16" y1="86" x2="704" y2="86" stroke="#eef0f4" stroke-width="1"/>

  <!-- row 1: vendor analytics -->
  <text x="24" y="128" font-size="13.5" font-weight="600" fill="#334155">Vendor usage analytics</text>
  <use href="#ck" x="330" y="123"/>
  <use href="#ds" x="444" y="123"/>
  <use href="#ds" x="558" y="123"/>
  <use href="#ds" x="670" y="123"/>

  <!-- row 2: observability / proxy -->
  <text x="24" y="190" font-size="13.5" font-weight="600" fill="#334155">Observability / API proxy</text>
  <use href="#ck" x="330" y="185"/>
  <use href="#ck" x="444" y="185"/>
  <use href="#ds" x="558" y="185"/>
  <use href="#ds" x="670" y="185"/>

  <!-- row 3: Codenomics (highlight) -->
  <rect x="12" y="218" width="696" height="60" rx="12" fill="#eef2ff"/>
  <rect x="24" y="237" width="22" height="22" rx="6" fill="url(#cn)"/>
  <g transform="translate(24 237) scale(0.344)">
    <path d="M17 42 L28 34 L36 39 L48 23" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M48 23 L41 23 M48 23 L48 30" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="54" y="253" font-size="14" font-weight="700" fill="#0f172a">Codenomics</text>
  <use href="#ck" x="330" y="248"/>
  <use href="#ck" x="444" y="248"/>
  <use href="#ck" x="558" y="248"/>
  <use href="#ck" x="670" y="248"/>
</svg>
