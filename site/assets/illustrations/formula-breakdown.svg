<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" fill="none"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, Arial, sans-serif"
     role="img" aria-label="The true cost per commit formula: compute dollars, plus prompts times attention dollars, plus active time times hourly rate — all divided by commits shipped — equals $16.60 true cost per commit.">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.10"/></filter>
  </defs>

  <text x="22" y="20" font-size="11" font-weight="700" letter-spacing="1.3" fill="#94a3b8">THE NUMERATOR — WHAT A COMMIT COSTS</text>

  <!-- numerator chips -->
  <rect x="22" y="34" width="210" height="76" rx="12" fill="#ffffff" stroke="#e7e9ee"/>
  <rect x="22" y="44" width="4" height="56" rx="2" fill="#4f46e5"/>
  <text x="42" y="66" font-size="14" font-weight="700" fill="#4f46e5">Compute $</text>
  <text x="42" y="88" font-size="11" font-weight="500" fill="#94a3b8">API-equiv tokens · cache-aware</text>

  <rect x="255" y="34" width="210" height="76" rx="12" fill="#ffffff" stroke="#e7e9ee"/>
  <rect x="255" y="44" width="4" height="56" rx="2" fill="#8b5cf6"/>
  <text x="275" y="66" font-size="14" font-weight="700" fill="#7c3aed">Prompts × attention $</text>
  <text x="275" y="88" font-size="11" font-weight="500" fill="#94a3b8">human focus per prompt</text>

  <rect x="488" y="34" width="210" height="76" rx="12" fill="#ffffff" stroke="#e7e9ee"/>
  <rect x="488" y="44" width="4" height="56" rx="2" fill="#94a3b8"/>
  <text x="508" y="66" font-size="14" font-weight="700" fill="#475569">Active time × hourly $</text>
  <text x="508" y="88" font-size="11" font-weight="500" fill="#94a3b8">supervision · optional</text>

  <text x="243" y="79" text-anchor="middle" font-size="22" font-weight="600" fill="#cbd5e1">+</text>
  <text x="476" y="79" text-anchor="middle" font-size="22" font-weight="600" fill="#cbd5e1">+</text>

  <!-- fraction bar -->
  <line x1="22" y1="132" x2="698" y2="132" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- denominator -->
  <text x="360" y="162" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">commits shipped</text>
  <text x="360" y="181" text-anchor="middle" font-size="11" font-weight="500" fill="#94a3b8">detected git commits, per session</text>

  <!-- equals -->
  <text x="360" y="224" text-anchor="middle" font-size="22" font-weight="700" fill="#cbd5e1">=</text>

  <!-- result card -->
  <g filter="url(#sh)"><rect x="232" y="244" width="256" height="124" rx="16" fill="#0f172a"/></g>
  <text x="360" y="280" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="1.5" fill="#a5b4fc">TRUE $ / COMMIT</text>
  <text x="360" y="330" text-anchor="middle" font-size="42" font-weight="800" fill="#ffffff">$16.60</text>
  <text x="360" y="352" text-anchor="middle" font-size="11" font-weight="500" fill="#94a3b8">blended, this period</text>
</svg>
